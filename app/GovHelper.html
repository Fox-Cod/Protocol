};
function expandSitQuery(lq, words) {
  const expanded = new Set(words);
  for (const [key, syns] of Object.entries(SIT_SYNONYMS)) {
    if (lq.includes(key)) expanded.add(key);
    for (const s of syns) {
      if (lq.includes(s)) {
        expanded.add(key);
        expanded.add(s);
      }
    }
  }
  return [...expanded];
}
function searchScenarios(q) {
  if (!q || q.trim().length < 2) return [];
  const lq = q.toLowerCase().trim();
  const words = lq.split(/[\s,;.]+/).filter(w => w.length >= 2);
  const terms = expandSitQuery(lq, words);
  const scored = [];
  for (const sc of SCENARIOS) {
    let score = 0;
    const hitTriggers = new Set();
    for (const tr of sc.triggers) {
      // Прямое вхождение триггера в запрос — самый сильный сигнал
      if (lq.includes(tr)) {
        score += tr.length >= 5 ? 12 : 7;
        hitTriggers.add(tr);
      }
      // Слово из запроса совпадает с триггером целиком
      else if (words.includes(tr)) {
        score += 8;
        hitTriggers.add(tr);
      }
      // Частичное совпадение слова и триггера — слабый сигнал (только для длинных слов)
      else if (words.some(w => w.length >= 4 && (tr === w || tr.startsWith(w) || w.startsWith(tr)))) {
        score += 2;
        hitTriggers.add(tr);
      }
    }
    // Совпадение по заголовку
    const titleLow = sc.title.toLowerCase();
    if (titleLow.includes(lq)) score += 10;else if (words.some(w => w.length >= 3 && titleLow.includes(w))) score += 5;
    // Бонус за несколько разных попаданий (точнее ситуация)
    if (hitTriggers.size >= 2) score += 4;
    // Синоним-бонус: если запрос содержит синоним, а у сценария есть точный триггер = ключу.
    // Но если в запросе есть уточнение места (машина/дом/багажник/квартира) — не тянем к общему обыску.
    const hasCarWord = /машин|багажник|авто|тачк|салон|тс\b/.test(lq);
    const hasHomeWord = /дом|квартир|жилищ|ордер|хата/.test(lq);
    for (const [key, syns] of Object.entries(SIT_SYNONYMS)) {
      const queryHasSyn = syns.some(sy => lq.includes(sy)) || lq.includes(key);
      if (!queryHasSyn) continue;
      // общий «обыск» не бустим, если речь явно про машину или дом
      if (key === "обыск" && (hasCarWord || hasHomeWord)) continue;
      if (sc.triggers.includes(key)) score += 6;
    }
    if (score > 0) scored.push({
      ...sc,
      _score: score
    });
  }
  scored.sort((a, b) => b._score - a._score);
  return scored;
}

// tokenize + expand с синонимами
function expandQuery(q) {
  const lq = q.toLowerCase().trim();

  for (const group of SYNONYMS) {
    const hit = group.some(syn => {
      if (lq.includes(syn)) return true; // фраза содержит синоним
      // слово запроса совпадает с синонимом или является его началом (≥4 симв.)
      return words.some(w => w === syn || w.length >= 4 && (syn.startsWith(w) || w.startsWith(syn)));

    if (hit) group.forEach(s => expanded.add(s));

const LS_KEY = "govhelper_state_v1";
let _stateCache = null;
function loadState() {
  if (_stateCache) return _stateCache;
  try {
    const raw = localStorage.getItem(LS_KEY);
    _stateCache = raw ? JSON.parse(raw) : {};
  } catch {
    _stateCache = {};
  }
  return _stateCache;
}

function saveState(patch) {

    ...(_stateCache || {}),
    ...patch

  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(_stateCache));

  }, 400);

// Гарантированно уникальный ID (Date.now может дать дубль в одну мс)
let _uidCounter = 0;
function uid() {
  return Date.now() * 1000 + _uidCounter++ % 1000;
}

// Извлечь срок (в месяцах) и штраф (в $) из статьи
function parsePunishment(art) {
  const p = art.punishment || "";
  let months = 0,
    fine = 0;
  const mMatch = p.match(/(\d+)\s*месяц/i);
  if (mMatch) months = parseInt(mMatch[1]);
  const yMatch = p.match(/(\d+)\s*(?:год|лет|года)/i);
  if (yMatch) months += parseInt(yMatch[1]) * 12;
  // штраф: берём максимальное число рядом с $
  const fines = [...p.matchAll(/([\d.\s]+)\$/g)].map(m => parseInt(m[1].replace(/[.\s]/g, "")));
  if (fines.length) fine = Math.max(...fines.filter(n => !isNaN(n)));
  return {
    months,
    fine
  };
}
